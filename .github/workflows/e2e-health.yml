name: E2E Health Daily

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run daily health suite
        run: npm run test:e2e -- e2e/public-pages.spec.ts e2e/workout-flow.spec.ts e2e/workout-recovery.spec.ts e2e/chaos-resilience.spec.ts
        env:
          PLAYWRIGHT_E2E_BYPASS_AUTH: "true"
